server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: rutas del cliente (React Router) y PWA -> index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # El service worker no debe cachearse de forma agresiva.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
}
